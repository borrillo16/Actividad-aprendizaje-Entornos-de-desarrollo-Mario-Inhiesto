<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Autores</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
    <body onload="readAutores()" class="container mt-4">

        <h1>Gestión de Autores</h1>

        <h2 class="mt-4">Crear / Editar Autor</h2>

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control" placeholder="Nombre del autor">
        </div>

        <div class="mb-3">
            <label class="form-label">País</label>
            <input type="text" id="pais" class="form-control" placeholder="País del autor">
        </div>

        <button onclick="addAutor()" class="btn btn-primary">Guardar</button>
        <a href="../html/libros.html" class="btn btn-secondary ms-2">Ir a Libros</a>


        <h2 class="mt-4">Autores</h2>
        <ul id="autores" class="list-group mb-4">
            <li class="list-group-item text-muted" id="no-autores">No hay autores registrados</li>
        </ul>


        <a href="../html/index.html" class="btn btn-secondary mb-3">Volver al menú</a>


        <script src="../js/autores.js"></script>
    </body>
</html>
