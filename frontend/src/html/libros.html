<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Libros</title>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>
    <body onload="readLibros()" class="container mt-4">

        <h1>Gestión de Libros</h1>

        <h2 class="mt-4">Crear / Editar Libro</h2>

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" id="titulo" class="form-control" placeholder="Título del libro">
        </div>

        <div class="mb-3">
            <label class="form-label">Género</label>
            <input type="text" id="genero" class="form-control" placeholder="Género literario">
        </div>

        <div class="mb-3">
            <label class="form-label">Autor</label>
            <select id="autor_id" class="form-select"></select>
        </div>

        <button onclick="addLibro()" class="btn btn-primary">Guardar</button>
        <a href="autores.html" class="btn btn-secondary ms-2">Ir a Autores</a>


        <h2 class="mt-4">Libros</h2>
        <ul id="libros" class="list-group mb-4"></ul>

        <a href="../html/index.html" class="btn btn-secondary mb-3">Volver al menú</a>


        <script src="../js/libros.js"></script>
    </body>
</html>
